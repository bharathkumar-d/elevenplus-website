name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build React app
        working-directory: client
        env:
          # Set this secret in: GitHub repo → Settings → Secrets → Actions
          # Value: your Cloudflare tunnel URL, e.g. https://elevenplus-api.example.com
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          # Needed so create-react-app doesn't fail on warnings
          CI: false
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: client/build
          # Prevents GitHub Pages from processing the site through Jekyll
          # (required for folders starting with underscore like _next)
          enable_jekyll: false
